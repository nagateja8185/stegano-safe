<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SteganoSafe - Secure login to access steganography-based encrypted file sharing">
    <title>Login — SteganoSafe</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <h1>SteganoSafe</h1>
                <p>Secure File Sharing System</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="form-input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </span>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required
                            autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="form-input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password"
                            required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="hidden"
                    style="color: var(--error); font-size: 0.8125rem; margin-bottom: 16px; padding: 10px; background: var(--error-bg); border-radius: 8px; border: 1px solid rgba(239,68,68,0.2);">
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                        <polyline points="10 17 15 12 10 7" />
                        <line x1="15" y1="12" x2="3" y2="12" />
                    </svg>
                    Sign In
                </button>
            </form>

            <div style="margin-top: 24px; text-align: center;">
                <p style="color: var(--text-secondary); font-size: 0.8125rem;">
                    Don't have an account?
                    <a href="/register" style="color: var(--accent); font-weight: 600;">Register here</a>
                </p>
            </div>

            <!-- Security Info -->
            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 8px; justify-content: center;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" width="14"
                        height="14">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">AES-256-GCM Encrypted • LSB
                        Steganography • RBAC Protected</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // Check if already logged in (but prevent redirect loops)
        (async () => {
            // If we were just redirected here, don't immediately redirect back
            const wasRedirected = sessionStorage.getItem('auth_redirect');
            if (wasRedirected) {
                sessionStorage.removeItem('auth_redirect');
                return; // Stay on login page
            }

            try {
                const data = await API.get('/api/auth/check');
                if (data && data.authenticated) {
                    sessionStorage.setItem('auth_redirect', '1');
                    window.location.href = data.user.role === 'admin'
                        ? '/admin/dashboard' : '/dashboard';
                }
            } catch (e) { /* not logged in, stay on page */ }
        })();

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-message');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = 'Please enter both username and password.';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> Signing in...';
            errorEl.classList.add('hidden');

            try {
                const data = await API.post('/api/auth/login', { username, password });
                if (data && data.success) {
                    Toast.show('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || '/dashboard';
                    }, 500);
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
            }
        });
    </script>
</body>

</html>
